name: "Terraform & Frontend Deploy"

on:
  push:
    branches:
      - main

# Permisos necesarios para interactuar con AWS OIDC si lo usaras, 
# o para leer el estado de Terraform si está en S3.
permissions:
  id-token: write
  contents: read

jobs:
  # --- JOB 1: INFRAESTRUCTURA (Terraform) ---
  terraform:
    name: "Terraform Infrastructure"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    outputs: # Definimos outputs para que el siguiente job los lea
      api_url: ${{ steps.tf_outputs.outputs.api_endpoint }}
      results_url: ${{ steps.tf_outputs.outputs.results_api_url }}
      bucket_name: ${{ steps.tf_outputs.outputs.frontend_bucket_name }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false # Necesario para capturar outputs fácilmente

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Capture Terraform Outputs
        id: tf_outputs
        run: |
          # Capturamos los outputs y los seteamos como outputs del step
          echo "api_endpoint=$(terraform output -raw api_endpoint)" >> $GITHUB_OUTPUT
          echo "results_api_url=$(terraform output -raw results_api_url)" >> $GITHUB_OUTPUT
          echo "frontend_bucket_name=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT

  # --- JOB 2: FRONTEND (React + TS) ---
  deploy-frontend:
    name: "Build & Deploy React App"
    runs-on: ubuntu-latest
    needs: terraform # IMPORTANTE: Espera a que termine la infraestructura
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      # --- AQUÍ ESTÁ LA MAGIA ---
      # Creamos el archivo .env dinámicamente usando los outputs de Terraform del JOB 1
      - name: Create .env file
        run: |
          echo "VITE_API_URL=${{ needs.terraform.outputs.api_url }}" > .env
          echo "VITE_RESULTS_URL=${{ needs.terraform.outputs.results_url }}" >> .env

      - name: Build Project (React + TS)
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Sincronizar la carpeta 'dist' (generada por Vite) con el bucket de S3
      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ needs.terraform.outputs.bucket_name }} --delete